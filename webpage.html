<!DOCTYPE html>
<html>
<head>
    <title>Web Page</title>
    <Style>
     .output{
        color:brown ;
     }
     .onclick{
       height: 20px;
       width:40px;
    color:blueviolet ;
     }
    .show{
        height:25px;
        width:50px;
        border :none ;
        color:darkgreen ;
    }
   .onClick-hover{
    color:white;
    background-color:blue;
   }

    </Style>
</head>
<body>

    <h1>Hello </h1>
    <p>Click the button below:</p>

    <button onclick="show()">Click Me</button>

    <p id="output"></p>

    <script>
        function show() {
            document.getElementById("output").innerHTML = "Hello Everyone";
        }
    </script>

</body>
</html>
