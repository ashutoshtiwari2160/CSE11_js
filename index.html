<!DOCTYPE html>
<html>
<head>
    <title>My First Web Page</title>
</head>
<body>

    <h1>Hello 👋</h1>
    <p>Click the button below:</p>

    <button onclick="showMessage()">Click Me</button>

    <p id="output"></p>

    <script>
        function showMessage() {
            document.getElementById("output").innerHTML = "You clicked the button! 🎉";
        }
    </script>

</body>
</html>
