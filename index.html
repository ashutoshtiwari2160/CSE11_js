<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPERIMENT_01</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div id="setupStep">
            <h1>Grade Calculator</h1>
            <p>How many subjects are you calculating?</p>
            <input type="number" id="subjectCount" placeholder="e.g. 5">
            <button id="setupBtn" class="btn-primary">Generate Inputs</button>
        </div>
    
        <div id="inputStep" class="hidden">
            <h1>Enter Marks</h1>
            <div id="marksList"></div>
            <div class="button-group">
                <button id="calcBtn" class="btn-success">Calculate</button>
                <button id="resetBtn" class="btn-outline">Reset</button>
            </div>
        </div>
        <div id="resultDisplay" class="hidden">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
